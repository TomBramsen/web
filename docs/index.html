<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Energi Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0f172a;
      --card:    #1e293b;
      --border:  #334155;
      --text:    #f1f5f9;
      --muted:   #94a3b8;
      --on:      #22c55e;
      --off:     #475569;
      --accent:  #3b82f6;
      --warn:    #f59e0b;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      padding: 1.5rem 1rem 3rem;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 1.5rem;
    }
    .header h1 { font-size: 1.1rem; font-weight: 600; letter-spacing: .05em; color: var(--muted); text-transform: uppercase; }
    .meta { font-size: .75rem; color: var(--muted); text-align: right; line-height: 1.6; }
    .meta .countdown { color: var(--accent); }

    .grid {
      display: grid;
      gap: 1rem;
      grid-template-columns: 1fr;
      max-width: 480px;
      margin: 0 auto;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: .75rem;
      padding: 1.25rem 1.5rem;
    }
    .card-label {
      font-size: .7rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: .6rem;
    }

    /* Power now */
    .power-value {
      font-size: 3rem;
      font-weight: 700;
      letter-spacing: -.02em;
      line-height: 1;
    }
    .power-unit { font-size: 1.2rem; font-weight: 400; color: var(--muted); margin-left: .2rem; }

    /* Lights */
    .device-list { list-style: none; display: flex; flex-direction: column; gap: .5rem; }
    .device {
      display: flex;
      align-items: center;
      gap: .75rem;
      font-size: .9rem;
    }
    .dot {
      width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
      background: var(--off);
    }
    .dot.on { background: var(--on); box-shadow: 0 0 6px var(--on); }
    .device-name { flex: 1; }
    .device-brightness {
      font-size: .75rem;
      color: var(--muted);
      width: 2.5rem;
      text-align: right;
    }
    .device-power {
      font-size: .75rem;
      color: var(--muted);
      width: 3.5rem;
      text-align: right;
    }
    .device.off .device-name { color: var(--off); }
    .no-devices { color: var(--muted); font-size: .85rem; }

    /* Energy stats */
    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: .3rem 0;
    }
    .stat-row + .stat-row { border-top: 1px solid var(--border); margin-top: .4rem; padding-top: .7rem; }
    .stat-label { font-size: .85rem; color: var(--muted); }
    .stat-value { font-size: 1.5rem; font-weight: 600; }
    .stat-unit { font-size: .85rem; color: var(--muted); margin-left: .2rem; }

    /* Error banner */
    .error-banner {
      background: #7f1d1d;
      border: 1px solid #dc2626;
      border-radius: .5rem;
      padding: .75rem 1rem;
      font-size: .85rem;
      margin-bottom: 1rem;
      display: none;
    }

    .spinner {
      display: inline-block;
      width: 10px; height: 10px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin-left: .4rem;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div style="max-width:480px;margin:0 auto">
    <div class="header">
      <h1>⚡ Energi</h1>
      <div class="meta">
        <div id="updated">–</div>
        <div>Opdaterer om <span class="countdown" id="countdown">60</span>s <span id="spinner" class="spinner"></span></div>
      </div>
    </div>

    <div id="error-banner" class="error-banner">Kunne ikke hente data – viser seneste kendte værdier.</div>

    <div class="grid">
      <!-- Forbrug nu -->
      <div class="card">
        <div class="card-label">Forbrug nu</div>
        <div class="power-value" id="power">–<span class="power-unit">W</span></div>
      </div>

      <!-- Lys -->
      <div class="card">
        <div class="card-label">Lys · <span id="lights-on-count">–</span> tændt</div>
        <ul class="device-list" id="device-list">
          <li class="no-devices">Indlæser…</li>
        </ul>
      </div>

      <!-- Energi -->
      <div class="card">
        <div class="card-label">Energiforbrug</div>
        <div class="stat-row">
          <span class="stat-label">I går</span>
          <span><span class="stat-value" id="yesterday">–</span><span class="stat-unit">kWh</span></span>
        </div>
        <div class="stat-row">
          <span class="stat-label" id="month-label">Denne måned</span>
          <span><span class="stat-value" id="month">–</span><span class="stat-unit">kWh</span></span>
        </div>
      </div>
    </div>
  </div>

  <script>
    const DATA_URL = './data.json';
    const REFRESH_S = 60;

    let countdown = REFRESH_S;
    let lastData = null;

    function fmt(n, decimals = 1) {
      if (n == null) return '–';
      return n.toLocaleString('da-DK', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
    }

    function fmtPower(w) {
      if (w == null) return '–';
      if (w >= 1000) return `${fmt(w / 1000)}<span class="power-unit">kW</span>`;
      return `${fmt(w, 0)}<span class="power-unit">W</span>`;
    }

    function fmtTime(iso) {
      if (!iso) return '–';
      const d = new Date(iso);
      return d.toLocaleTimeString('da-DK', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }

    function render(data) {
      document.getElementById('updated').textContent = `Opdateret ${fmtTime(data.updated)}`;
      document.getElementById('power').innerHTML = fmtPower(data.power_now_w);
      document.getElementById('lights-on-count').textContent = data.lights_on ?? '–';
      document.getElementById('yesterday').textContent = fmt(data.yesterday_kwh);
      document.getElementById('month').textContent = fmt(data.month_kwh);
      if (data.month_name) {
        document.getElementById('month-label').textContent = data.month_name;
      }

      const list = document.getElementById('device-list');
      const devices = data.devices ?? [];
      if (devices.length === 0) {
        list.innerHTML = '<li class="no-devices">Ingen enheder konfigureret</li>';
        return;
      }

      // Sort: on first, then by name
      const sorted = [...devices].sort((a, b) => (b.on ? 1 : 0) - (a.on ? 1 : 0) || a.name.localeCompare(b.name, 'da'));

      list.innerHTML = sorted.map(d => {
        const cls = d.on ? 'on' : 'off';
        const brightness = d.brightness != null ? `<span class="device-brightness">${d.brightness}%</span>` : '<span class="device-brightness"></span>';
        const power = d.power_w > 0.5 ? `<span class="device-power">${fmt(d.power_w, 0)}W</span>` : '<span class="device-power"></span>';
        const err = d.error ? ' ⚠' : '';
        return `<li class="device ${cls}">
          <span class="dot ${cls}"></span>
          <span class="device-name">${d.name}${err}</span>
          ${d.on && d.brightness != null ? brightness : '<span class="device-brightness"></span>'}
          ${power}
        </li>`;
      }).join('');
    }

    async function fetchData() {
      document.getElementById('spinner').style.display = 'inline-block';
      try {
        const r = await fetch(`${DATA_URL}?t=${Date.now()}`);
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        const data = await r.json();
        lastData = data;
        render(data);
        document.getElementById('error-banner').style.display = 'none';
      } catch (e) {
        console.warn('Fetch failed:', e);
        document.getElementById('error-banner').style.display = 'block';
        if (lastData) render(lastData);
      } finally {
        document.getElementById('spinner').style.display = 'none';
      }
    }

    // Countdown timer
    setInterval(() => {
      countdown -= 1;
      if (countdown <= 0) {
        countdown = REFRESH_S;
        fetchData();
      }
      document.getElementById('countdown').textContent = countdown;
    }, 1000);

    // Initial load
    fetchData();
  </script>
</body>
</html>
